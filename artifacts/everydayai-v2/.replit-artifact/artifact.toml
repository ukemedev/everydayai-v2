kind = "web"
previewPath = "/"
title = "EverydayAI v2"
version = "1.0.0"
id = "artifacts/everydayai-v2"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/everydayai-v2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/everydayai-v2", "run", "build" ]
run = "pnpm --filter @workspace/everydayai-v2 run start"

[services.env]
PORT = "3000"
BASE_PATH = "/"
